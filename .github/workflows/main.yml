name: Build TrollFoolsAdRemover

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install ldid dpkg

      - name: Compile dylib
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -dynamiclib -o TrollFoolsAdRemover.dylib Tweak.m \
            -framework Foundation -framework UIKit \
            -isysroot $SDK_PATH \
            -fobjc-arc \
            -miphoneos-version-min=14.0

      - name: Package deb
        run: |
          mkdir -p package/DEBIAN
          cp control package/DEBIAN/
          
          mkdir -p package/Library/MobileSubstrate/DynamicLibraries
          cp TrollFoolsAdRemover.dylib package/Library/MobileSubstrate/DynamicLibraries/
          cp TrollFoolsAdRemover.plist package/Library/MobileSubstrate/DynamicLibraries/
          
          find package -type d -exec chmod 755 {} \;
          find package -type f -exec chmod 644 {} \;
          chmod 755 package/DEBIAN
          chmod 755 package/Library/MobileSubstrate/DynamicLibraries/*.dylib
          
          dpkg-deb -b package TrollFoolsAdRemover.deb
          
          mkdir -p output
          mv TrollFoolsAdRemover.deb output/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollFoolsAdRemover.deb
          path: output/*.deb