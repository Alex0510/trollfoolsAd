name: Build TrollFoolsAdRemover

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install ldid dpkg

      - name: Setup Theos
        run: |
          if [ ! -d "$HOME/theos" ]; then
            git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
            cd $HOME/theos
            git submodule update --init --recursive
            cd -
          fi
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Verify source files
        run: |
          ls -la
          test -f Makefile
          test -f Tweak.x
          test -f control
          test -f TrollFoolsAdRemover.plist

      - name: Build dylib
        env:
          TARGET: iphone:clang:latest
          ARCHS: arm64
        run: |
          make clean || true
          make

      - name: Locate compiled dylib
        id: locate
        run: |
          DYLIB_PATH=$(find . -name "*.dylib" -type f | head -n 1)
          if [ -z "$DYLIB_PATH" ]; then
            echo "No dylib found!"
            exit 1
          fi
          echo "dylib_path=$DYLIB_PATH" >> $GITHUB_ENV
          echo "Found dylib at $DYLIB_PATH"

      - name: Package deb manually
        run: |
          mkdir -p package/DEBIAN
          cp control package/DEBIAN/
          
          mkdir -p package/Library/MobileSubstrate/DynamicLibraries
          cp "${{ env.dylib_path }}" package/Library/MobileSubstrate/DynamicLibraries/TrollFoolsAdRemover.dylib
          cp TrollFoolsAdRemover.plist package/Library/MobileSubstrate/DynamicLibraries/
          
          find package -type d -exec chmod 755 {} \;
          find package -type f -exec chmod 644 {} \;
          chmod 755 package/DEBIAN
          chmod 755 package/Library/MobileSubstrate/DynamicLibraries/*.dylib
          
          dpkg-deb -b package TrollFoolsAdRemover.deb
          
          mkdir -p output
          mv TrollFoolsAdRemover.deb output/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollFoolsAdRemover.deb
          path: output/*.deb