name: Build TrollFoolsAdRemover

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    # 如果需要 Linux 环境，可以使用 ubuntu-latest，但 Theos 在 macOS 上更稳定
    # 这里使用 macOS 因为 Xcode SDK 更完整

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # 如果 Theos 不存在则克隆
          if [ ! -d "$HOME/theos" ]; then
            git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          fi
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install lld (linker)
        run: |
          brew install lld

      - name: Verify source files exist
        run: |
          ls -la
          test -f Makefile || (echo "Makefile missing" && exit 1)
          test -f Tweak.xm || (echo "Tweak.xm missing" && exit 1)
          test -f control || (echo "control missing" && exit 1)
          test -f TrollFoolsAdRemover.plist || (echo "TrollFoolsAdRemover.plist missing" && exit 1)

      - name: Build package
        env:
          TARGET: iphone:clang:latest
          ARCHS: arm64
          LD: /usr/local/bin/ld.lld
          LDFLAGS: -fuse-ld=lld
          VERSION: 1.0
          PACKAGE_NAME: TrollFoolsAdRemover
        run: |
          make clean || true
          make package
          mkdir -p output
          find . -name "*.deb" -exec mv {} output/ \;

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollFoolsAdRemover.deb
          path: output/*.deb