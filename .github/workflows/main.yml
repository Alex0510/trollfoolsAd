name: Build TrollFoolsAdRemover

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install ldid dpkg

      - name: Setup Theos
        run: |
          if [ ! -d "$HOME/theos" ]; then
            git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          fi
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Verify source files
        run: |
          ls -la
          test -f Makefile
          test -f Tweak.xm
          test -f control
          test -f TrollFoolsAdRemover.plist

      - name: Build package
        env:
          TARGET: iphone:clang:latest
          ARCHS: arm64
          # 可选：使用 lld 链接器（如果不需要可以注释掉）
          # LD: /usr/local/bin/ld.lld
          # LDFLAGS: -fuse-ld=lld
        run: |
          make clean || true
          make package
          mkdir -p output
          find . -name "*.deb" -exec mv {} output/ \;

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollFoolsAdRemover.deb
          path: output/*.deb